html, body {
  margin: 0; padding: 0;
  width: 100%; height: 100%;
  overflow: hidden;
  font-family: 'Press Start 2P', monospace;
  background: #000;
  touch-action: none;
}

#gameWrap {
  position: relative;
  width: 100vw; height: 100vh;
  overflow: hidden;
}

canvas { display: block; width: 100%; height: 100%; image-rendering: pixelated; image-rendering: crisp-edges; }

/* CRT scanline overlay */
#crt {
  position: absolute; inset: 0;
  pointer-events: none;
  z-index: 50;
  background:
    repeating-linear-gradient(
      0deg,
      rgba(0,0,0,0.12) 0px,
      rgba(0,0,0,0.12) 1px,
      transparent 1px,
      transparent 3px
    );
}
/* CRT vignette */
#crt::after {
  content: '';
  position: absolute; inset: 0;
  background: radial-gradient(ellipse at center,
    transparent 55%,
    rgba(0,0,0,0.55) 100%);
}

.hud {
  position: absolute;
  inset: 0 0 auto 0;
  padding: 10px 14px;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  pointer-events: none;
  z-index: 10;
  gap: 8px;
}

.panel {
  background: #110022;
  border: 3px solid #ff00ff;
  border-bottom: 3px solid #8800ff;
  border-right: 3px solid #8800ff;
  padding: 8px 12px;
  color: #ff00ff;
  font-size: clamp(8px, 1.8vw, 13px);
  text-shadow: 0 0 8px #ff00ff, 0 0 16px #ff00ff;
  min-width: 90px;
  text-align: center;
  image-rendering: pixelated;
  letter-spacing: 1px;
}

.overlay {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  background: rgba(0,0,0,0.7);
  z-index: 20;
}
.hidden { display: none; }

.card {
  width: min(94vw, 460px);
  background: #0a0015;
  border: 4px solid #ff00ff;
  border-bottom: 4px solid #8800ff;
  border-right: 4px solid #8800ff;
  padding: 28px 22px;
  text-align: center;
  box-shadow: 0 0 40px #ff00ff66, 0 0 80px #8800ff44;
}

.title {
  margin: 0 0 8px;
  font-size: clamp(16px, 4vw, 28px);
  color: #fff;
  text-shadow: 0 0 10px #ff00ff, 2px 2px 0 #ff00ff, -1px -1px 0 #00ffff;
  line-height: 1.6;
  letter-spacing: 2px;
}

.rainbow-title span {
  display: inline-block;
}

.subtitle {
  margin: 0 0 20px;
  color: #cc88ff;
  font-size: clamp(7px, 1.6vw, 10px);
  line-height: 2;
}

button {
  appearance: none; border: 0;
  background: #ff00ff;
  border-bottom: 4px solid #880088;
  border-right: 4px solid #880088;
  padding: 14px 18px;
  width: 100%;
  font-family: 'Press Start 2P', monospace;
  font-size: clamp(9px, 2vw, 13px);
  color: #fff;
  cursor: pointer;
  text-shadow: 2px 2px 0 #880088;
  transition: transform 0.07s;
  letter-spacing: 1px;
}
button:active { transform: translate(2px,2px); border-bottom-width: 2px; border-right-width: 2px; }

.smallNote {
  margin-top: 14px;
  color: #8855bb;
  font-size: clamp(6px, 1.3vw, 9px);
  line-height: 2;
}

.controls {
  position: absolute; left: 0; right: 0; bottom: 0;
  padding: 0 12px 14px;
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  z-index: 15;
  pointer-events: none;
}
.leftControls, .rightControls {
  display: flex; gap: 8px;
  pointer-events: auto;
}

.ctrlBtn {
  width: 72px; height: 72px;
  background: #110022;
  border: 3px solid #ff00ff;
  border-bottom: 5px solid #8800ff;
  border-right: 5px solid #8800ff;
  color: #ff00ff;
  display: flex; align-items: center; justify-content: center;
  font-size: 26px;
  user-select: none; touch-action: none;
  cursor: pointer;
  text-shadow: 0 0 6px #ff00ff;
}
.ctrlBtn:active { border-bottom-width: 2px; border-right-width: 2px; transform: translate(2px,2px); }

/* Pixelated rainbow shimmer on title */
@keyframes rainbow {
  0%   { color: #ff0055; text-shadow: 2px 2px 0 #880022; }
  16%  { color: #ff8800; text-shadow: 2px 2px 0 #884400; }
  33%  { color: #ffff00; text-shadow: 2px 2px 0 #888800; }
  50%  { color: #00ff88; text-shadow: 2px 2px 0 #008844; }
  66%  { color: #00ccff; text-shadow: 2px 2px 0 #006688; }
  83%  { color: #cc00ff; text-shadow: 2px 2px 0 #660088; }
  100% { color: #ff0055; text-shadow: 2px 2px 0 #880022; }
}
.title { animation: rainbow 2s linear infinite; }

@keyframes blink { 0%,49%{opacity:1} 50%,100%{opacity:0} }
.blink { animation: blink 0.8s step-end infinite; }

<body>
<div id="gameWrap">
  <canvas id="game"></canvas>
  <div id="crt"></div>

  <div class="hud">
    <div class="panel" id="hearts">❤❤❤</div>
    <div class="panel" id="scoreBox">★ 0</div>
    <div class="panel" id="levelBox">LV 1</div>
    <div class="panel" id="hiBox">HI 0</div>
  </div>

  <div class="overlay" id="startScreen">
    <div class="card">
      <h1 class="title">UNICORN<br>RUNNER</h1>
      <p class="subtitle">COLLECT ★ STARS<br>REACH THE PORTAL<br>SURVIVE THE DARKNESS</p>
      <button id="startBtn">▶ START GAME</button>
      <p class="smallNote blink">PRESS SPACE / TAP TO BEGIN<br>← → TO MOVE  ▲ TO JUMP</p>
    </div>
  </div>

  <div class="overlay hidden" id="gameOverScreen">
    <div class="card">
      <h1 class="title">GAME<br>OVER</h1>
      <p class="subtitle" id="gameOverText">STARS: 0</p>
      <button id="restartBtn">▶ TRY AGAIN</button>
    </div>
  </div>

  <div class="controls">
    <div class="leftControls">
      <div class="ctrlBtn" id="leftBtn">◀</div>
      <div class="ctrlBtn" id="rightBtn">▶</div>
    </div>
    <div class="rightControls">
      <div class="ctrlBtn" id="jumpBtn">▲</div>
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const startScreen = document.getElementById("startScreen");
const gameOverScreen = document.getElementById("gameOverScreen");
const startBtn = document.getElementById("startBtn");
const restartBtn = document.getElementById("restartBtn");
const gameOverText = document.getElementById("gameOverText");
const heartsEl = document.getElementById("hearts");
const scoreBox = document.getElementById("scoreBox");
const levelBox = document.getElementById("levelBox");
const hiBox = document.getElementById("hiBox");

const controls = { left:false, right:false, jumpPressed:false };

// ─── WORLD ───────────────────────────────────────────────────────────────────
const world = { gravity:0.58, groundY:0, cameraX:0, width:0, level:1 };
let hiScore = 0;

// ─── PLAYER ──────────────────────────────────────────────────────────────────
const player = {
  x:180, y:0, w:52, h:52,
  vx:0, vy:0,
  speed:4.6, jumpPower:-13,
  onGround:false, facing:1,
  animTimer:0, frame:0,
  hearts:3, invuln:0,
  respawnX:180, respawnY:0
};

let running = false, score = 0;
let platforms=[], stars=[], sparkles=[], rainbowTrail=[], clouds=[], portal=null, enemies=[];
let bgStars=[], tick=0;
let levelTransFlash = 0;
let screenShake = 0;

// ─── PIXEL UNICORN SPRITE ─────────────────────────────────────────────────────
// 13x13 pixel grid frames drawn procedurally – no external asset needed
function drawPixelUnicorn(px, py, frame, facingRight, invuln) {
  if (invuln > 0 && Math.floor(invuln/4)%2===0) { ctx.globalAlpha = 0.35; }

  const s = 4; // pixel size
  const legAnim = Math.sin(frame * 0.9) * 2;

  ctx.save();
  if (!facingRight) {
    ctx.translate(px + player.w/2, 0);
    ctx.scale(-1,1);
    ctx.translate(-(px + player.w/2), 0);
  }

  const d = (col,row,color,w=1,h=1) => {
    ctx.fillStyle = color;
    ctx.fillRect(px + col*s, py + row*s, s*w, s*h);
  };

  // Body
  d(3,4,'#fff8ff',7,5);
  d(2,5,'#fff8ff',1,3); d(10,5,'#fff8ff',1,3);
  // Head
  d(5,1,'#fff8ff',5,4);
  d(4,2,'#fff8ff',1,3); d(10,2,'#fff8ff',1,3);
  // Horn (rainbow cycle)
  const hc = `hsl(${(tick*4)%360},100%,70%)`;
  d(8,0,hc,1,1); d(9,1,hc,1,1); d(8,1,hc,1,1);
  // Eye
  d(9,2,'#220033',1,1);
  // Mane (rainbow)
  const maneColors = ['#ff4488','#ff8844','#ffdd00','#44ff88','#44aaff','#aa44ff'];
  for(let i=0;i<6;i++) {
    d(4, 1+i, maneColors[i%6], 2, 1);
  }
  // Legs
  const ll = Math.round(legAnim);
  d(4, 9,'#ffe0ff',2, 3+ll);
  d(7, 9,'#ffe0ff',2, 3-ll);
  d(4, 9,'#cc99ff',2,1);
  d(7, 9,'#cc99ff',2,1);
  // Tail (rainbow)
  for(let i=0;i<5;i++) {
    d(2, 5+i, maneColors[(i+Math.floor(tick/4))%6], 2, 1);
  }
  // Blush
  d(8,3,'#ffaacc',2,1);

  ctx.restore();
  ctx.globalAlpha = 1;
}

// ─── PIXEL ENEMY (bat) ────────────────────────────────────────────────────────
function drawPixelEnemy(ex, ey, frame) {
  const s = 4;
  const wingFlap = Math.sin(frame*0.4)*2;
  const d=(col,row,color,w=1,h=1)=>{
    ctx.fillStyle=color;
    ctx.fillRect(ex+col*s, ey+row*s+(frame%2), s*w, s*h);
  };
  // body
  d(3,2,'#440066',4,3);
  // eyes
  d(3,2,'#ff2244',1,1); d(6,2,'#ff2244',1,1);
  // wings
  d(0,1,'#220044',3,2+Math.round(wingFlap));
  d(7,1,'#220044',3,2+Math.round(wingFlap));
  // fangs
  d(4,5,'#fff',1,1); d(5,5,'#fff',1,1);
}

// ─── RESIZE ───────────────────────────────────────────────────────────────────
function resizeCanvas() {
  const dpr = Math.max(1, Math.min(window.devicePixelRatio||1, 2));
  canvas.width  = Math.floor(window.innerWidth * dpr);
  canvas.height = Math.floor(window.innerHeight * dpr);
  canvas.style.width  = window.innerWidth+"px";
  canvas.style.height = window.innerHeight+"px";
  world.groundY = canvas.height - 160;
}
resizeCanvas();
window.addEventListener("resize", resizeCanvas);

// ─── LEVEL BUILD ─────────────────────────────────────────────────────────────
function makeLevel(levelNum) {
  world.level = levelNum;
  world.cameraX = 0;
  platforms=[]; stars=[]; sparkles=[]; rainbowTrail=[]; enemies=[];
  levelTransFlash = 30;

  // regenerate background stars
  bgStars = Array.from({length:120}, ()=>({
    x: Math.random()*5000, y: Math.random()*(world.groundY*0.9),
    r: Math.random()*1.5+0.5, twinkle: Math.random()*Math.PI*2,
    color: `hsl(${Math.random()*360},80%,80%)`
  }));

  const levelLength = Math.max(4200, canvas.width * 3.5);
  world.width = levelLength;

  // Ground
  platforms.push({x:0, y:world.groundY, w:levelLength, h:160, kind:"ground"});

  // Floating platforms – varied widths & heights per level
  const pd = [
    {x:320, y:-140},{x:660, y:-240},{x:980, y:-160},{x:1340, y:-300},
    {x:1680, y:-180},{x:2000, y:-120},{x:2340, y:-260},{x:2680, y:-180},
    {x:3010, y:-320},{x:3360, y:-220},{x:3700, y:-150}
  ];
  for (const p of pd) {
    platforms.push({x:p.x, y:world.groundY+p.y, w:180+Math.random()*60|0, h:18, kind:"plat"});
  }

  // Stars
  for(let i=0;i<44;i++) {
    const x = 260 + i*94;
    let y = world.groundY - 70;
    for(const p of platforms) {
      if(p.kind!=="ground" && x>p.x+10 && x<p.x+p.w-10) { y=p.y-36; break; }
    }
    stars.push({x, y, r:10, collected:false, bob:Math.random()*Math.PI*2});
  }

  // Enemies (flying bats patrolling platforms)
  for(let i=2;i<platforms.length;i+=2) {
    const p = platforms[i];
    enemies.push({
      x: p.x+40, y: p.y-48,
      w:40, h:40,
      startX: p.x+20, endX: p.x+p.w-60,
      dir:1, speed: 1.2+(levelNum*0.15),
      frame:0, frameTimer:0
    });
  }

  // Clouds (parallax)
  clouds = Array.from({length:14},()=>({
    x: Math.random()*world.width,
    y: 40+Math.random()*200,
    w: 100+Math.random()*160,
    h: 28+Math.random()*22,
    speed: 0.05+Math.random()*0.1,
    color: `hsla(${260+Math.random()*60},60%,90%,0.75)`
  }));

  portal = {x:world.width-240, y:world.groundY-150, w:80, h:120, pulse:0};

  player.respawnX = 180;
  player.respawnY = world.groundY - player.h - 10;
  resetPlayerPosition();
  updateHud();
}

// ─── HUD ─────────────────────────────────────────────────────────────────────
function updateHud() {
  heartsEl.textContent = "❤".repeat(Math.max(0,player.hearts));
  scoreBox.textContent  = `★ ${score}`;
  levelBox.textContent  = `LV ${world.level}`;
  if (score > hiScore) hiScore = score;
  hiBox.textContent = `HI ${hiScore}`;
}

function resetPlayerPosition() {
  player.x = player.respawnX;
  player.y = player.respawnY;
  player.vx = 0; player.vy = 0;
}

// ─── GAME STATE ──────────────────────────────────────────────────────────────
function startGame() {
  running=true; score=0;
  player.hearts=3; player.invuln=0;
  makeLevel(1);
  startScreen.classList.add("hidden");
  gameOverScreen.classList.add("hidden");
  updateHud();
}

function endGame() {
  running=false;
  gameOverText.textContent = `STARS: ${score}   HI: ${hiScore}`;
  gameOverScreen.classList.remove("hidden");
}

function loseHeart() {
  if(player.invuln>0) return;
  player.hearts--;
  player.invuln = 90;
  screenShake = 18;
  updateHud();
  if(player.hearts<=0) { endGame(); } else { resetPlayerPosition(); }
}

function rectsOverlap(a,b) {
  return a.x<b.x+b.w && a.x+a.w>b.x && a.y<b.y+b.h && a.y+a.h>b.y;
}

// ─── UPDATE ──────────────────────────────────────────────────────────────────
function update() {
  if(!running) return;
  tick++;
  if(screenShake>0) screenShake--;
  if(levelTransFlash>0) levelTransFlash--;
  if(player.invuln>0) player.invuln--;

  const move = (controls.left?-1:0)+(controls.right?1:0);
  player.vx = move * player.speed;
  if(move!==0) player.facing = move>0?1:-1;

  if(controls.jumpPressed && player.onGround) {
    player.vy = player.jumpPower;
    player.onGround = false;
    // jump sparkle burst
    for(let i=0;i<8;i++) sparkles.push({
      x:player.x+player.w/2, y:player.y+player.h,
      vx:(Math.random()-0.5)*4, vy:Math.random()*2+0.5,
      life:18, size:3+Math.random()*3,
      color:`hsl(${Math.random()*360},100%,70%)`
    });
  }
  controls.jumpPressed = false;

  player.vy += world.gravity;
  player.x += player.vx;
  player.y += player.vy;
  player.onGround = false;

  for(const p of platforms) {
    const wasAbove = player.y+player.h-player.vy <= p.y;
    const overlapsX = player.x+player.w>p.x && player.x<p.x+p.w;
    const touchesTop = player.y+player.h>=p.y && player.y+player.h<=p.y+p.h+18;
    if(wasAbove && overlapsX && touchesTop && player.vy>=0) {
      player.y = p.y - player.h;
      player.vy = 0;
      player.onGround = true;
    }
  }

  player.x = Math.max(0, Math.min(player.x, world.width-player.w));
  if(player.y > canvas.height+220) loseHeart();

  // rainbow trail
  if(Math.abs(player.vx)>0.1 || !player.onGround) {
    rainbowTrail.push({x:player.x+player.w*0.2, y:player.y+player.h*0.55, life:18, w:player.w*0.6});
    if(rainbowTrail.length>120) rainbowTrail.shift();
  }

  player.animTimer++;
  if(player.animTimer>=5) { player.animTimer=0; player.frame=(player.frame+1)%8; }

  // Stars
  for(const s of stars) {
    if(s.collected) continue;
    s.bob += 0.07;
    const sb={x:s.x-s.r, y:s.y+Math.sin(s.bob)*5-s.r, w:s.r*2, h:s.r*2};
    if(rectsOverlap(player, sb)) {
      s.collected=true; score++;
      if(score>hiScore) hiScore=score;
      updateHud();
      for(let i=0;i<18;i++) sparkles.push({
        x:s.x, y:s.y,
        vx:(Math.random()-0.5)*4.5,
        vy:-Math.random()*3-0.5,
        life:28+Math.random()*14, size:3+Math.random()*4,
        color:`hsl(${i*20},100%,65%)`
      });
    }
  }

  // Enemies
  for(const e of enemies) {
    e.x += e.dir * e.speed;
    if(e.x<=e.startX || e.x+e.w>=e.endX) e.dir*=-1;
    e.frameTimer++;
    if(e.frameTimer>6){e.frameTimer=0;e.frame=(e.frame+1)%4;}
    if(rectsOverlap(player, e)) loseHeart();
  }

  // Sparkles
  for(let i=sparkles.length-1;i>=0;i--) {
    const sp=sparkles[i];
    sp.x+=sp.vx; sp.y+=sp.vy; sp.vy+=0.08; sp.life--;
    if(sp.life<=0) sparkles.splice(i,1);
  }

  // Trail decay
  for(let i=rainbowTrail.length-1;i>=0;i--) {
    rainbowTrail[i].life--;
    if(rainbowTrail[i].life<=0) rainbowTrail.splice(i,1);
  }

  // Portal
  portal.pulse += 0.07;
  if(rectsOverlap(player, portal)) { makeLevel(world.level+1); }

  // Camera
  const targetCam = player.x - canvas.width*0.35;
  world.cameraX += (targetCam - world.cameraX)*0.09;
  world.cameraX = Math.max(0, Math.min(world.cameraX, world.width - canvas.width));
}

// ─── DRAW HELPERS ─────────────────────────────────────────────────────────────
function drawPixelRect(x,y,w,h,color,borderColor) {
  ctx.fillStyle = color;
  ctx.fillRect(x,y,w,h);
  if(borderColor) {
    ctx.fillStyle = borderColor;
    ctx.fillRect(x,y,w,3);  // top highlight
    ctx.fillRect(x,y,3,h);  // left highlight
    ctx.fillStyle = '#00000040';
    ctx.fillRect(x+w-3,y,3,h); // right shadow
    ctx.fillRect(x,y+h-3,w,3); // bottom shadow
  }
}

function drawBackground() {
  // Sky gradient – shifts hue per level
  const hue = (world.level * 40) % 360;
  const sky = ctx.createLinearGradient(0,0,0,canvas.height);
  sky.addColorStop(0,   `hsl(${hue},60%,8%)`);
  sky.addColorStop(0.5, `hsl(${(hue+30)%360},50%,14%)`);
  sky.addColorStop(1,   `hsl(${(hue+60)%360},40%,20%)`);
  ctx.fillStyle = sky;
  ctx.fillRect(0,0,canvas.width,canvas.height);

  // Twinkling pixel bg stars
  for(const s of bgStars) {
    s.twinkle += 0.04;
    const brightness = 0.5 + Math.sin(s.twinkle)*0.5;
    ctx.globalAlpha = brightness;
    ctx.fillStyle = s.color;
    const screenX = s.x - world.cameraX*0.05;
    ctx.fillRect(screenX%canvas.width, s.y, s.r*2, s.r*2);
  }
  ctx.globalAlpha = 1;

  // Full-screen rainbow arch in the sky (moves slowly with camera)
  const archX = canvas.width/2 - world.cameraX*0.02;
  const archY = canvas.height*0.3;
  const archColors = ['#ff003399','#ff880099','#ffff0099','#00ff8899','#0088ff99','#8800ff99'];
  for(let i=0;i<archColors.length;i++) {
    ctx.strokeStyle = archColors[i];
    ctx.lineWidth = 14;
    ctx.beginPath();
    ctx.arc(archX, archY+canvas.height*0.4, canvas.height*0.55 + i*16, Math.PI, Math.PI*2);
    ctx.stroke();
  }
}

function drawCloud(c) {
  const cx = c.x - world.cameraX * c.speed;
  ctx.fillStyle = c.color;
  // pixel blocky cloud
  const b = 16;
  ctx.fillRect(cx,         c.y+b,   c.w,   c.h-b);
  ctx.fillRect(cx+c.w*0.1, c.y,     c.w*0.6, c.h);
  ctx.fillRect(cx+c.w*0.35,c.y-b/2, c.w*0.3, b);
}

function drawPlatform(p) {
  const x = p.x - world.cameraX;
  const y = p.y;

  if(p.kind==="ground") {
    // Dark ground with rainbow trim
    ctx.fillStyle = '#110022';
    ctx.fillRect(x,y,p.w,p.h);
    // Rainbow pixel border along top
    const rcols=['#ff0055','#ff8800','#ffff00','#00ff88','#0088ff','#8800ff'];
    for(let i=0;i<rcols.length;i++) {
      ctx.fillStyle=rcols[i];
      for(let px2=x;px2<x+p.w;px2+=12) {
        if(Math.floor((px2-x)/12+i)%6===i%6) {
          ctx.fillRect(px2, y, 12, 8);
        }
      }
    }
    // checkerboard pattern
    for(let bx=x;bx<x+p.w;bx+=24) {
      for(let by=y+8;by<y+p.h;by+=24) {
        ctx.fillStyle=(Math.floor(bx/24)+Math.floor(by/24))%2===0?'#1a0033':'#110022';
        ctx.fillRect(bx,by,24,24);
      }
    }
    return;
  }

  // Floating platform – pixel style with rainbow glow pulse
  const glow = Math.sin(tick*0.06+p.x*0.01)*0.4+0.6;
  ctx.fillStyle = `rgba(68,0,102,${glow})`;
  ctx.fillRect(x,y,p.w,p.h);
  // top rainbow edge
  const rcols=['#ff0055','#ff8800','#ffff00','#00ff88','#0088ff','#8800ff'];
  for(let i=0;i<p.w;i+=6) {
    ctx.fillStyle = rcols[Math.floor(i/6+tick*0.1)%6];
    ctx.fillRect(x+i, y, 6, 4);
  }
  ctx.fillStyle='#220044';
  ctx.fillRect(x,y+4,p.w,p.h-4);
  // pixel highlight
  ctx.fillStyle='rgba(255,255,255,0.12)';
  ctx.fillRect(x,y+4,p.w,3);
}

function drawStar(s) {
  const x = s.x - world.cameraX;
  const y = s.y + Math.sin(s.bob)*5;
  const hue = (tick*3 + s.x*0.5)%360;
  ctx.save();
  ctx.translate(x, y);
  // glow
  ctx.shadowBlur=12; ctx.shadowColor=`hsl(${hue},100%,70%)`;
  ctx.fillStyle=`hsl(${hue},100%,75%)`;
  ctx.beginPath();
  for(let i=0;i<5;i++) {
    const o=i*Math.PI*2/5-Math.PI/2;
    const inn=o+Math.PI/5;
    ctx.lineTo(Math.cos(o)*12, Math.sin(o)*12);
    ctx.lineTo(Math.cos(inn)*5.5, Math.sin(inn)*5.5);
  }
  ctx.closePath(); ctx.fill();
  ctx.shadowBlur=0;
  ctx.restore();
}

function drawSparkles() {
  for(const sp of sparkles) {
    ctx.globalAlpha = Math.max(0, sp.life/30);
    ctx.fillStyle = sp.color;
    ctx.shadowBlur=6; ctx.shadowColor=sp.color;
    // pixel sparkle shape
    const px2=sp.x-world.cameraX;
    ctx.fillRect(px2-sp.size/2, sp.y-sp.size/2, sp.size, sp.size);
    ctx.fillRect(px2-sp.size/4, sp.y-sp.size,   sp.size/2, sp.size*2);
    ctx.fillRect(px2-sp.size,   sp.y-sp.size/4, sp.size*2, sp.size/2);
  }
  ctx.globalAlpha=1; ctx.shadowBlur=0;
}

function drawRainbowTrail() {
  const cols=['#ff0055','#ff8800','#ffff00','#00ff88','#0088ff','#cc00ff'];
  for(const t of rainbowTrail) {
    const a=t.life/18;
    for(let i=0;i<cols.length;i++) {
      ctx.globalAlpha = a*0.8;
      ctx.fillStyle = cols[i];
      ctx.fillRect(t.x-world.cameraX, t.y+i*3, t.w, 3);
    }
  }
  ctx.globalAlpha=1;
}

function drawPortal() {
  const x=portal.x-world.cameraX, y=portal.y;
  const pulse=Math.sin(portal.pulse)*5;
  const rcols=['#ff0055','#ff8800','#ffff00','#00ff88','#0088ff','#cc00ff'];

  ctx.save();
  ctx.translate(x+portal.w/2, y+portal.h/2);

  // Spinning rainbow rings
  for(let i=0;i<rcols.length;i++) {
    ctx.strokeStyle=rcols[i];
    ctx.lineWidth=5;
    ctx.shadowBlur=14; ctx.shadowColor=rcols[i];
    const rot = tick*0.04 + i*0.2;
    ctx.save();
    ctx.rotate(rot);
    ctx.beginPath();
    ctx.ellipse(0,0, 26+i*5+pulse, 44+i*4+pulse, 0,0,Math.PI*2);
    ctx.stroke();
    ctx.restore();
  }

  // Inner glow fill
  ctx.shadowBlur=30; ctx.shadowColor='#cc00ff';
  ctx.fillStyle=`rgba(80,0,120,${0.4+Math.sin(portal.pulse)*0.2})`;
  ctx.beginPath();
  ctx.ellipse(0,0,20,38,0,0,Math.PI*2);
  ctx.fill();

  // PORTAL label
  ctx.shadowBlur=0;
  ctx.fillStyle='#ffff00';
  ctx.font='bold 8px "Press Start 2P", monospace';
  ctx.textAlign='center';
  ctx.fillText('EXIT', 0, -54);

  ctx.restore();
}

function drawEnemy(e) {
  drawPixelEnemy(e.x - world.cameraX, e.y, e.frame);
}

function render() {
  // Screen shake
  if(screenShake>0) {
    const sx=(Math.random()-0.5)*screenShake*0.7;
    const sy=(Math.random()-0.5)*screenShake*0.7;
    ctx.save();
    ctx.translate(sx,sy);
  }

  drawBackground();
  for(const c of clouds) drawCloud(c);

  ctx.save();
  for(const p of platforms) drawPlatform(p);
  for(const s of stars) if(!s.collected) drawStar(s);
  for(const e of enemies) drawEnemy(e);
  drawRainbowTrail();
  drawSparkles();
  drawPortal();
  ctx.restore();

  // Draw unicorn
  drawPixelUnicorn(
    player.x - world.cameraX,
    player.y,
    player.frame,
    player.facing > 0,
    player.invuln
  );

  // Level transition flash
  if(levelTransFlash>0) {
    ctx.globalAlpha = levelTransFlash/30;
    ctx.fillStyle='#ffffff';
    ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.globalAlpha=1;
  }

  if(screenShake>0) ctx.restore();

  // Pixel scanline flicker on the canvas itself (subtle)
  ctx.globalAlpha=0.04;
  ctx.fillStyle='#000';
  for(let ly=tick%4;ly<canvas.height;ly+=4) {
    ctx.fillRect(0,ly,canvas.width,2);
  }
  ctx.globalAlpha=1;
}

// ─── GAME LOOP ────────────────────────────────────────────────────────────────
function gameLoop() {
  update();
  render();
  requestAnimationFrame(gameLoop);
}

// ─── CONTROLS ─────────────────────────────────────────────────────────────────
function holdButton(id, key) {
  const el=document.getElementById(id);
  const on=e=>{e.preventDefault();controls[key]=true;};
  const off=e=>{e.preventDefault();controls[key]=false;};
  el.addEventListener("pointerdown",on);
  el.addEventListener("pointerup",off);
  el.addEventListener("pointerleave",off);
  el.addEventListener("pointercancel",off);
}
holdButton("leftBtn","left");
holdButton("rightBtn","right");
document.getElementById("jumpBtn").addEventListener("pointerdown",e=>{
  e.preventDefault(); controls.jumpPressed=true;
});

window.addEventListener("keydown",e=>{
  if(e.code==="ArrowLeft"||e.code==="KeyA") controls.left=true;
  if(e.code==="ArrowRight"||e.code==="KeyD") controls.right=true;
  if(e.code==="ArrowUp"||e.code==="KeyW"||e.code==="Space") controls.jumpPressed=true;
});
window.addEventListener("keyup",e=>{
  if(e.code==="ArrowLeft"||e.code==="KeyA") controls.left=false;
  if(e.code==="ArrowRight"||e.code==="KeyD") controls.right=false;
});

startBtn.addEventListener("click", startGame);
restartBtn.addEventListener("click", startGame);

// ─── BOOT ─────────────────────────────────────────────────────────────────────
makeLevel(1);
render();
gameLoop();
</script>

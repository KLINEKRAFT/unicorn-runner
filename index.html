<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Unicorn Runner</title>
  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: #9fd8ff;
      touch-action: none;
    }

    #gameWrap {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: linear-gradient(to bottom, #7ccfff 0%, #c8efff 55%, #f8ecff 100%);
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    .hud {
      position: absolute;
      inset: 0 0 auto 0;
      padding: 14px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      pointer-events: none;
      z-index: 10;
    }

    .panel {
      background: rgba(230, 225, 235, 0.92);
      border-radius: 16px;
      padding: 12px 16px;
      box-shadow: 0 6px 0 rgba(0,0,0,0.12);
      color: #4b3d8f;
      font-weight: 700;
      font-size: 18px;
      min-width: 110px;
      text-align: center;
    }

    .overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255,255,255,0.08);
      z-index: 20;
      padding: 24px;
    }

    .hidden {
      display: none;
    }

    .card {
      width: min(92vw, 460px);
      background: rgba(255,255,255,0.92);
      border-radius: 24px;
      padding: 26px 24px;
      box-shadow: 0 16px 36px rgba(0,0,0,0.18);
      text-align: center;
    }

    .title {
      margin: 0 0 10px;
      font-size: clamp(32px, 6vw, 48px);
      color: #ef4bb3;
      font-weight: 800;
    }

    .subtitle {
      margin: 0 0 18px;
      color: #58489f;
      font-size: 16px;
      line-height: 1.5;
    }

    button {
      appearance: none;
      border: 0;
      border-radius: 18px;
      padding: 16px 20px;
      width: 100%;
      font-size: 18px;
      font-weight: 800;
      color: white;
      background: linear-gradient(180deg, #f58ed2, #ef4bb3);
      box-shadow: 0 6px 0 rgba(0,0,0,0.14);
      cursor: pointer;
    }

    .smallNote {
      margin-top: 14px;
      color: #63579b;
      font-size: 13px;
      line-height: 1.5;
    }

    .controls {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      padding: 0 16px 18px;
      display: flex;
      justify-content: space-between;
      align-items: end;
      z-index: 15;
      pointer-events: none;
    }

    .leftControls, .rightControls {
      display: flex;
      gap: 12px;
      pointer-events: auto;
    }

    .ctrlBtn {
      width: 80px;
      height: 80px;
      border-radius: 20px;
      background: rgba(220,220,228,0.86);
      color: #54459a;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      font-weight: 900;
      box-shadow: 0 8px 18px rgba(0,0,0,0.12);
      border: 0;
      user-select: none;
      touch-action: none;
    }
  </style>
</head>
<body>
  <div id="gameWrap">
    <canvas id="game"></canvas>

    <div class="hud">
      <div class="panel" id="hearts">💖💖💖</div>
      <div class="panel" id="scoreBox">Stars: 0</div>
      <div class="panel" id="levelBox">Level 1</div>
    </div>

    <div class="overlay" id="startScreen">
      <div class="card">
        <h1 class="title">Unicorn Runner</h1>
        <p class="subtitle">
          Run, jump, collect stars, and hop through the magical rainbow portal.
          Just cute platforming fun.
        </p>
        <button id="startBtn">Start Adventure</button>
        <div class="smallNote">
          Use left / right / jump. Falling loses a heart.
        </div>
      </div>
    </div>

    <div class="overlay hidden" id="gameOverScreen">
      <div class="card">
        <h1 class="title">Great Try!</h1>
        <p class="subtitle" id="gameOverText">You collected 0 stars.</p>
        <button id="restartBtn">Play Again</button>
      </div>
    </div>

    <div class="controls">
      <div class="leftControls">
        <div class="ctrlBtn" id="leftBtn">◀</div>
        <div class="ctrlBtn" id="rightBtn">▶</div>
      </div>
      <div class="rightControls">
        <div class="ctrlBtn" id="jumpBtn">▲</div>
      </div>
    </div>
  </div>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");

    const startScreen = document.getElementById("startScreen");
    const gameOverScreen = document.getElementById("gameOverScreen");
    const startBtn = document.getElementById("startBtn");
    const restartBtn = document.getElementById("restartBtn");
    const gameOverText = document.getElementById("gameOverText");
    const heartsEl = document.getElementById("hearts");
    const scoreBox = document.getElementById("scoreBox");
    const levelBox = document.getElementById("levelBox");

    const controls = {
      left: false,
      right: false,
      jumpPressed: false
    };

    const world = {
      gravity: 0.6,
      groundY: 0,
      cameraX: 0,
      width: 0,
      level: 1
    };

    const player = {
      x: 180,
      y: 0,
      w: 110,
      h: 110,
      vx: 0,
      vy: 0,
      speed: 4.8,
      jumpPower: -12.5,
      onGround: false,
      facing: 1,
      animTimer: 0,
      frame: 0,
      hearts: 3,
      invuln: 0,
      respawnX: 180,
      respawnY: 0
    };

    let running = false;
    let score = 0;
    let platforms = [];
    let stars = [];
    let sparkles = [];
    let rainbowTrail = [];
    let clouds = [];
    let portal = null;

    const spriteImage = new Image();
    let spriteLoaded = false;
    const spriteCols = 6;
    const spriteRows = 6;
    let frameW = 0;
    let frameH = 0;

    function resizeCanvas() {
      const dpr = Math.max(1, Math.min(window.devicePixelRatio || 1, 2));
      canvas.width = Math.floor(window.innerWidth * dpr);
      canvas.height = Math.floor(window.innerHeight * dpr);
      canvas.style.width = window.innerWidth + "px";
      canvas.style.height = window.innerHeight + "px";
      world.groundY = canvas.height - 180;
    }

    resizeCanvas();
    window.addEventListener("resize", resizeCanvas);

    spriteImage.onload = () => {
      spriteLoaded = true;
      frameW = spriteImage.width / spriteCols;
      frameH = spriteImage.height / spriteRows;
    };

    spriteImage.onerror = () => {
      console.log("Sprite failed to load");
    };

    spriteImage.src = "assets/unicorn_rider_sheet.png";

    function updateHud() {
      heartsEl.textContent = "💖".repeat(Math.max(0, player.hearts));
      scoreBox.textContent = `Stars: ${score}`;
      levelBox.textContent = `Level ${world.level}`;
    }

    function resetPlayerPosition() {
      player.x = player.respawnX;
      player.y = player.respawnY;
      player.vx = 0;
      player.vy = 0;
    }

    function makeLevel(levelNum) {
      world.level = levelNum;
      world.cameraX = 0;
      platforms = [];
      stars = [];
      sparkles = [];
      rainbowTrail = [];
      clouds = [];

      const levelLength = Math.max(4200, canvas.width * 3.5);
      world.width = levelLength;

      platforms.push({ x: 0, y: world.groundY, w: levelLength, h: 180, kind: "ground" });
      platforms.push({ x: 340, y: world.groundY - 140, w: 220, h: 28 });
      platforms.push({ x: 700, y: world.groundY - 240, w: 180, h: 28 });
      platforms.push({ x: 1020, y: world.groundY - 160, w: 220, h: 28 });
      platforms.push({ x: 1380, y: world.groundY - 290, w: 180, h: 28 });
      platforms.push({ x: 1720, y: world.groundY - 180, w: 210, h: 28 });
      platforms.push({ x: 2050, y: world.groundY - 110, w: 240, h: 28 });
      platforms.push({ x: 2410, y: world.groundY - 250, w: 180, h: 28 });
      platforms.push({ x: 2740, y: world.groundY - 170, w: 220, h: 28 });
      platforms.push({ x: 3090, y: world.groundY - 310, w: 180, h: 28 });
      platforms.push({ x: 3430, y: world.groundY - 210, w: 230, h: 28 });

      for (let i = 0; i < 40; i++) {
        const x = 260 + i * 92;
        let y = world.groundY - 60;
        if (i % 4 === 0) y = world.groundY - 130;
        if (i % 5 === 0) y = world.groundY - 190;

        for (const p of platforms) {
          if (p.kind !== "ground" && x > p.x + 10 && x < p.x + p.w - 10) {
            y = p.y - 40;
            break;
          }
        }

        stars.push({
          x, y, r: 12, collected: false, bob: Math.random() * Math.PI * 2
        });
      }

      for (let i = 0; i < 12; i++) {
        clouds.push({
          x: Math.random() * world.width,
          y: 60 + Math.random() * 220,
          w: 110 + Math.random() * 140,
          h: 30 + Math.random() * 24,
          speed: 0.06 + Math.random() * 0.12
        });
      }

      portal = {
        x: world.width - 220,
        y: world.groundY - 130,
        w: 90,
        h: 120,
        pulse: 0
      };

      player.respawnX = 180;
      player.respawnY = world.groundY - player.h;
      resetPlayerPosition();
      updateHud();
    }

    function startGame() {
      running = true;
      score = 0;
      player.hearts = 3;
      player.invuln = 0;
      makeLevel(1);
      startScreen.classList.add("hidden");
      gameOverScreen.classList.add("hidden");
      updateHud();
    }

    function endGame() {
      running = false;
      gameOverText.textContent = `You collected ${score} stars.`;
      gameOverScreen.classList.remove("hidden");
    }

    function loseHeart() {
      if (player.invuln > 0) return;
      player.hearts -= 1;
      player.invuln = 90;
      updateHud();

      if (player.hearts <= 0) {
        endGame();
      } else {
        resetPlayerPosition();
      }
    }

    function rectsOverlap(a, b) {
      return (
        a.x < b.x + b.w &&
        a.x + a.w > b.x &&
        a.y < b.y + b.h &&
        a.y + a.h > b.y
      );
    }

    function addTrail() {
      rainbowTrail.push({
        x: player.x + 8,
        y: player.y + player.h * 0.62,
        life: 14,
        w: 28
      });
      if (rainbowTrail.length > 100) rainbowTrail.shift();
    }

    function update() {
      if (!running) return;

      if (player.invuln > 0) player.invuln--;

      const move = (controls.left ? -1 : 0) + (controls.right ? 1 : 0);
      player.vx = move * player.speed;
      if (move !== 0) player.facing = move;

      if (controls.jumpPressed && player.onGround) {
        player.vy = player.jumpPower;
        player.onGround = false;
      }
      controls.jumpPressed = false;

      player.vy += world.gravity;
      player.x += player.vx;
      player.y += player.vy;
      player.onGround = false;

      for (const p of platforms) {
        const wasAbove = player.y + player.h - player.vy <= p.y;
        const overlapsX = player.x + player.w > p.x && player.x < p.x + p.w;
        const touchesTop = player.y + player.h >= p.y && player.y + player.h <= p.y + p.h + 18;

        if (wasAbove && overlapsX && touchesTop && player.vy >= 0) {
          player.y = p.y - player.h;
          player.vy = 0;
          player.onGround = true;
        }
      }

      if (player.x < 0) player.x = 0;
      if (player.x + player.w > world.width) player.x = world.width - player.w;

      if (player.y > canvas.height + 220) loseHeart();

      if (Math.abs(player.vx) > 0.1 || !player.onGround) addTrail();

      player.animTimer++;
      if (player.animTimer >= 7) {
        player.animTimer = 0;
        player.frame = (player.frame + 1) % 6;
      }

      for (const s of stars) {
        if (s.collected) continue;
        s.bob += 0.08;
        const starBox = { x: s.x - s.r, y: s.y - s.r, w: s.r * 2, h: s.r * 2 };
        if (rectsOverlap(player, starBox)) {
          s.collected = true;
          score++;
          updateHud();
          for (let i = 0; i < 14; i++) {
            sparkles.push({
              x: s.x,
              y: s.y,
              vx: (Math.random() - 0.5) * 3.2,
              vy: -Math.random() * 2.5 - 0.5,
              life: 22 + Math.random() * 12,
              size: 3 + Math.random() * 3
            });
          }
        }
      }

      for (let i = sparkles.length - 1; i >= 0; i--) {
        const sp = sparkles[i];
        sp.x += sp.vx;
        sp.y += sp.vy;
        sp.vy += 0.05;
        sp.life--;
        if (sp.life <= 0) sparkles.splice(i, 1);
      }

      for (let i = rainbowTrail.length - 1; i >= 0; i--) {
        rainbowTrail[i].life--;
        if (rainbowTrail[i].life <= 0) rainbowTrail.splice(i, 1);
      }

      portal.pulse += 0.08;
      if (rectsOverlap(player, portal)) {
        makeLevel(world.level + 1);
      }

      const targetCam = player.x - canvas.width * 0.35;
      world.cameraX += (targetCam - world.cameraX) * 0.08;
      world.cameraX = Math.max(0, Math.min(world.cameraX, world.width - canvas.width));
    }

    function drawCloud(x, y, w, h) {
      ctx.fillStyle = "rgba(255,255,255,0.82)";
      ctx.beginPath();
      ctx.ellipse(x + w * 0.2, y + h * 0.65, w * 0.2, h * 0.35, 0, 0, Math.PI * 2);
      ctx.ellipse(x + w * 0.48, y + h * 0.45, w * 0.29, h * 0.46, 0, 0, Math.PI * 2);
      ctx.ellipse(x + w * 0.76, y + h * 0.64, w * 0.22, h * 0.32, 0, 0, Math.PI * 2);
      ctx.fill();
    }

    function drawRoundedRect(x, y, w, h, r, fill) {
      ctx.fillStyle = fill;
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
      ctx.fill();
    }

    function drawPlatform(p) {
      const x = p.x - world.cameraX;
      const y = p.y;

      if (p.kind === "ground") {
        ctx.fillStyle = "#84db65";
        ctx.fillRect(x, y, p.w, p.h);

        for (let i = 0; i < p.w; i += 42) {
          ctx.fillStyle = "#5fc64d";
          ctx.fillRect(x + i, y, 24, 18);
          ctx.fillStyle = "#a6ef86";
          ctx.fillRect(x + i + 5, y + 4, 10, 10);
        }
        ctx.fillStyle = "#8f69d8";
        ctx.fillRect(x, y + 18, p.w, 8);
        return;
      }

      drawRoundedRect(x, y, p.w, p.h, 12, "#ffe8ff");
      ctx.fillStyle = "#ff87d1";
      ctx.fillRect(x, y + p.h - 8, p.w, 8);
    }

    function drawStar(s) {
      const x = s.x - world.cameraX;
      const y = s.y + Math.sin(s.bob) * 5;
      ctx.save();
      ctx.translate(x, y);
      ctx.fillStyle = "#ffd84f";
      ctx.beginPath();
      for (let i = 0; i < 5; i++) {
        const outer = i * Math.PI * 2 / 5 - Math.PI / 2;
        const inner = outer + Math.PI / 5;
        ctx.lineTo(Math.cos(outer) * 14, Math.sin(outer) * 14);
        ctx.lineTo(Math.cos(inner) * 6.5, Math.sin(inner) * 6.5);
      }
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    }

    function drawSparkles() {
      for (const sp of sparkles) {
        ctx.globalAlpha = Math.max(0, sp.life / 34);
        ctx.fillStyle = "#fff7aa";
        ctx.fillRect(sp.x - world.cameraX, sp.y, sp.size, sp.size);
      }
      ctx.globalAlpha = 1;
    }

    function drawRainbowTrail() {
      const colors = ["#ff5fa8","#ffb44f","#fff36c","#72e56c","#60b7ff","#b56dff"];
      for (const t of rainbowTrail) {
        const a = t.life / 14;
        for (let i = 0; i < colors.length; i++) {
          ctx.globalAlpha = a * 0.7;
          ctx.fillStyle = colors[i];
          ctx.fillRect(t.x - world.cameraX, t.y + i * 3, t.w, 3);
        }
      }
      ctx.globalAlpha = 1;
    }

    function drawPortal() {
      const x = portal.x - world.cameraX;
      const y = portal.y;
      const pulse = Math.sin(portal.pulse) * 4;

      ctx.save();
      ctx.translate(x + portal.w / 2, y + portal.h / 2);
      ctx.strokeStyle = "#8b5cff";
      ctx.lineWidth = 10;
      ctx.beginPath();
      ctx.ellipse(0, 0, 28 + pulse, 48 + pulse, 0, 0, Math.PI * 2);
      ctx.stroke();

      ctx.strokeStyle = "#ff69c6";
      ctx.lineWidth = 6;
      ctx.beginPath();
      ctx.ellipse(0, 0, 18 + pulse * 0.5, 36 + pulse * 0.5, 0, 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();
    }

    function drawPlayer() {
      const px = player.x - world.cameraX;
      const py = player.y;

      if (!spriteLoaded) {
        ctx.fillStyle = "#fff";
        ctx.fillRect(px, py, player.w, player.h);
        return;
      }

      let sx = 0;
      let sy = 0;

      if (!player.onGround) {
        sx = 0;
        sy = 2;
      } else if (Math.abs(player.vx) > 0.1) {
        sx = player.frame % 6;
        sy = 0;
      } else {
        sx = 0;
        sy = 0;
      }

      ctx.save();

      if (player.invuln > 0 && Math.floor(player.invuln / 4) % 2 === 0) {
        ctx.globalAlpha = 0.45;
      }

      if (player.facing < 0) {
        ctx.translate(px + player.w / 2, 0);
        ctx.scale(-1, 1);
        ctx.translate(-(px + player.w / 2), 0);
      }

      ctx.drawImage(
        spriteImage,
        sx * frameW,
        sy * frameH,
        frameW,
        frameH,
        px,
        py,
        player.w,
        player.h
      );

      ctx.restore();
    }

    function render() {
      const skyGrad = ctx.createLinearGradient(0, 0, 0, canvas.height);
      skyGrad.addColorStop(0, "#76d3ff");
      skyGrad.addColorStop(0.55, "#d5f4ff");
      skyGrad.addColorStop(1, "#f3e7ff");
      ctx.fillStyle = skyGrad;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      for (const cloud of clouds) {
        drawCloud(cloud.x - world.cameraX * cloud.speed, cloud.y, cloud.w, cloud.h);
      }

      for (const p of platforms) drawPlatform(p);
      for (const s of stars) if (!s.collected) drawStar(s);
      drawRainbowTrail();
      drawSparkles();
      drawPortal();
      drawPlayer();
    }

    function gameLoop() {
      update();
      render();
      requestAnimationFrame(gameLoop);
    }

    function holdButton(id, key) {
      const el = document.getElementById(id);
      const on = (e) => {
        e.preventDefault();
        controls[key] = true;
      };
      const off = (e) => {
        e.preventDefault();
        controls[key] = false;
      };
      el.addEventListener("pointerdown", on);
      el.addEventListener("pointerup", off);
      el.addEventListener("pointerleave", off);
      el.addEventListener("pointercancel", off);
    }

    holdButton("leftBtn", "left");
    holdButton("rightBtn", "right");

    document.getElementById("jumpBtn").addEventListener("pointerdown", (e) => {
      e.preventDefault();
      controls.jumpPressed = true;
    });

    window.addEventListener("keydown", (e) => {
      if (e.code === "ArrowLeft" || e.code === "KeyA") controls.left = true;
      if (e.code === "ArrowRight" || e.code === "KeyD") controls.right = true;
      if (e.code === "ArrowUp" || e.code === "KeyW" || e.code === "Space") controls.jumpPressed = true;
    });

    window.addEventListener("keyup", (e) => {
      if (e.code === "ArrowLeft" || e.code === "KeyA") controls.left = false;
      if (e.code === "ArrowRight" || e.code === "KeyD") controls.right = false;
    });

    startBtn.addEventListener("click", startGame);
    restartBtn.addEventListener("click", startGame);

    makeLevel(1);
    render();
    gameLoop();
  </script>
</body>
</html>
